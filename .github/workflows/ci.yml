name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install --require-hashes -r requirements.txt
      - name: requirements.txt is in sync with requirements.in
        run: |
          pip install pip-tools
          mkdir -p /tmp/reqcheck && cp requirements.in /tmp/reqcheck/
          ( cd /tmp/reqcheck && pip-compile --generate-hashes --output-file=requirements.txt requirements.in )
          diff -u requirements.txt /tmp/reqcheck/requirements.txt || {
            echo "::error::requirements.txt is not pip-compile --generate-hashes's current output for requirements.in — recompile and commit"
            exit 1
          }
      - name: tests
        run: python -m pytest tests/ -q
      - name: eval structure (all skills)
        run: python -m tooling.cli eval
      - name: eval structure (collapsed entrypoints)
        run: python -m tooling.cli eval --skills-root collapsed/skills
      - name: provenance drift
        run: python -m tooling.cli drift
      - name: Generated trees are in sync
        run: |
          python -m tooling.cli generate --manifest skills/manifest.yaml --docs-root . --skills-root skills --collapsed-root collapsed
          ok=1
          git diff --exit-code skills/    || { git diff --stat skills/;    echo "::error::standalone skills/ drifted — regenerate and commit"; ok=0; }
          git diff --exit-code collapsed/ || { git diff --stat collapsed/; echo "::error::collapsed/ drifted — regenerate and commit"; ok=0; }
          [ "$ok" -eq 1 ]
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: '**/*.md'
      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck=0.9.0-1
          shopt -s nullglob
          shellcheck --source-path=SCRIPTDIR -x tooling/*.sh hooks/*.sh hooks/lib/*.sh
