taxonomy_version: v0.2
skills:
  - name: hunting-silent-failures
    description: >
      Reviews changes for swallowed or silently-handled errors — empty
      catch/rescue blocks, ignored returned errors, bare excepts, unhandled
      promise rejections, broad exception catches — and for unsafe fallbacks,
      missing timeouts, and absent retries/circuit-breakers. Use when reviewing
      error handling, exceptions, try/catch, rescue, fallback, resilience,
      timeouts, or resource cleanup on failure paths.
    shape: diff
    wave: 1
    cross_ref: [4]    # primary owner: tracing-correctness-and-invariants
    built_from:
      - { category: 2, source: docs/research/cluster-1-correctness.md#2 }
      - { category: 4, source: docs/research/cluster-1-correctness.md#4 }

  - name: reviewing-naming-and-readability
    description: >
      Reviews code for naming and local readability: intention-revealing names
      vs placeholders, function length and cyclomatic/cognitive complexity, deep
      nesting, magic numbers/strings, mixed levels of abstraction, and comment
      accuracy. Use when reviewing readability, naming, complexity, nesting,
      magic values, or comments.
    shape: diff
    wave: 1
    built_from:
      - { category: 5, source: docs/research/cluster-2-readability.md#5 }
      - { category: 6, source: docs/research/cluster-2-readability.md#6 }
      - { category: 7, source: docs/research/cluster-2-readability.md#7 }

  - name: reviewing-module-design
    description: >
      Reviews module and type design: cohesion and coupling (via connascence),
      encapsulation, hard-to-misuse interfaces, and making illegal states
      unrepresentable. Use when reviewing class/module structure, interfaces,
      type or data modeling, coupling, or API ergonomics for callers.
    shape: diff
    wave: 1
    built_from:
      - { category: 9, source: docs/research/cluster-3-structure.md#9 }
      - { category: 10, source: docs/research/cluster-3-structure.md#10 }

  - name: checking-restraint
    description: >
      Reviews changes for over-engineering — premature abstraction, speculative
      generality, the wrong abstraction, and premature optimization without a
      profile. The restraint / brake-pedal lens. Use when a change adds
      abstraction layers, config knobs, generality, or hand-optimized code, or
      when asking whether a change is doing too much.
    shape: diff
    wave: 1
    cross_ref: [15]   # primary owner: reviewing-performance-and-efficiency (counterweight lens here)
    built_from:
      - { category: 11, source: docs/research/cluster-3-structure.md#11 }
      - { category: 15, source: docs/research/cluster-4-runtime.md#15 }

  - name: reviewing-llm-integration
    description: >
      Reviews LLM/AI integration code for prompt-injection surface, the lethal
      trifecta, unvalidated model output, missing eval coverage, unpinned models,
      unbounded token/cost, and PII sent to third-party models. Use when
      reviewing code that calls an LLM or model API, builds prompts, parses
      model output, or wires up agents and tools.
    shape: diff
    wave: 1
    cross_ref: [27]   # primary owner: auditing-compliance-and-provenance
    built_from:
      - { category: 25, source: docs/research/cluster-4-runtime.md#25 }
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }

  - name: finding-maintainability-hotspots
    description: >
      Scans a repository for maintainability hotspots: high churn × complexity
      files, change-coupling, bus-factor / knowledge concentration, and
      untracked tech debt. A repo-wide / scheduled scan rather than a single-diff
      review. Use when auditing maintainability, tech debt, refactoring targets,
      or risky areas across the codebase.
    shape: repo
    wave: 1
    built_from:
      - { category: 21, source: docs/research/cluster-6-evolution.md#21 }

  - name: sweeping-for-security
    description: >
      Sweeps changes for security risks: injection (SQL/command/XSS) from
      unparameterized or unencoded untrusted input, missing authorization on
      object references (IDOR), hardcoded secrets, weak or homegrown crypto,
      unsafe deserialization, SSRF, CSRF, permissive CORS/TLS settings, and
      sensitive data in logs or URLs. Use when reviewing auth, user input,
      queries, secrets, crypto, cookies, file paths, or any code handling
      untrusted data.
    shape: diff
    wave: 2
    built_from:
      - { category: 14, source: docs/research/cluster-4-runtime.md#14 }

  - name: reviewing-performance-and-efficiency
    description: >
      Reviews changes for performance and efficiency problems: N+1 queries,
      await-in-loop and chatty per-item I/O, accidental O(n²) on hot paths,
      recomputed expensive values, caches without invalidation, buffering
      whole payloads instead of streaming, allocation pressure, bundle/startup
      bloat, and per-request cloud cost. Demands a profile before accepting
      optimization claims. Use when reviewing queries in loops, hot paths,
      caching, large payloads, or anything justified by "performance."
    shape: diff
    wave: 2
    built_from:
      - { category: 15, source: docs/research/cluster-4-runtime.md#15 }

  - name: reviewing-test-quality
    description: >
      Reviews tests for quality: behavior vs implementation coupling,
      over-mocking, meaningful branch/edge coverage on the diff, regression
      tests for bug fixes, isolation and determinism (no shared state, real
      clocks, or unseeded randomness), right level per the pyramid/trophy, and
      disabled/focused tests sneaking in. Use when reviewing test files, test
      coverage, mocks, fixtures, flaky tests, or a bug fix's tests.
    shape: diff
    wave: 2
    built_from:
      - { category: 17, source: docs/research/cluster-5-verification.md#17 }

  - name: reviewing-migration-and-data-safety
    description: >
      Reviews schema migrations and data changes for safety: backward
      compatibility with the running app (expand/migrate/contract), table
      locks from NOT NULL/index/FK on large tables, unbatched backfills,
      missing dual-write during transitions, irreversible or destructive DDL,
      and integrity constraints left to app code. Use when reviewing
      migrations, ALTER TABLE, backfills, schema or data-format changes, or
      anything touching persistence.
    shape: diff
    wave: 2
    built_from:
      - { category: 20, source: docs/research/cluster-5-verification.md#20 }

  - name: reviewing-accessibility-and-i18n
    description: >
      Reviews UI changes for accessibility and internationalization: semantic
      HTML vs div-with-onclick, keyboard operability and focus management,
      accessible names on icon buttons and inputs, contrast, ARIA misuse,
      hardcoded user-facing strings, naive pluralization, non-locale-aware
      number/date/currency formatting, and RTL-unsafe layout. Use when
      reviewing components, templates, markup, forms, modals, UI text, or
      anything user-facing.
    shape: diff
    wave: 2
    built_from:
      - { category: 23, source: docs/research/cluster-6-evolution.md#23 }

  - name: tracing-correctness-and-invariants
    description: >
      Traces whether a change actually does what it claims: invariants and
      postconditions preserved on every branch, boundary values (0, 1, n-1,
      empty, max, negative) handled, off-by-one in ranges and loop bounds,
      null/undefined checked at boundaries, exhaustive switch/match, resource
      cleanup on all paths, money as integer minor units, monotonic clocks for
      durations, UTC for storage. Use when reviewing logic, algorithms, loops,
      conditionals, edge cases, or whether the implementation matches the
      stated intent.
    shape: diff
    wave: 3
    built_from:
      - { category: 1, source: docs/research/cluster-1-correctness.md#1 }
      - { category: 4, source: docs/research/cluster-1-correctness.md#4 }

  - name: reviewing-concurrency-and-async
    description: >
      Reviews concurrent and async code for races and ordering bugs: shared
      mutable state without synchronization, check-then-act spanning an await,
      lost updates from interleaved requests, lock ordering, unawaited
      promises, accidental sequential awaits, non-idempotent message
      consumers, exactly-once assumptions, and missing cancellation/timeout
      propagation. Use when reviewing threads, async/await, promises, locks,
      queues, message handlers, or anything two callers can run at once.
    shape: diff
    wave: 3
    built_from:
      - { category: 3, source: docs/research/cluster-1-correctness.md#3 }

  - name: checking-idioms-and-consistency
    description: >
      Checks that a change follows the project's own conventions and the
      language/framework's idioms: formatter applied, idiomatic constructs
      over clumsy equivalents, recurring problems solved the same way the
      codebase already does, no second parallel way to do the same thing,
      consistent naming/casing/imports/file layout. Use when reviewing style,
      conventions, idioms, framework usage, or consistency with the rest of
      the codebase.
    shape: diff
    wave: 3
    built_from:
      - { category: 8, source: docs/research/cluster-2-readability.md#8 }

  - name: reviewing-api-contract-safety
    description: >
      Reviews public API and contract changes for safety: backward
      compatibility (versioned/deprecated if breaking), hard-to-misuse
      shapes, "when in doubt leave it out" on new surface, typed and stable
      error contracts, idempotency for unsafe operations, pagination and rate
      limits on collections, contract tests, and no internal-representation
      leakage. Use when reviewing REST/GraphQL/RPC endpoints, request or
      response shapes, SDK surface, webhooks, or any consumer-facing contract.
    shape: diff
    wave: 3
    built_from:
      - { category: 13, source: docs/research/cluster-3-structure.md#13 }

  - name: reviewing-observability-and-operability
    description: >
      Reviews changes for production operability: structured logs with
      consistent fields and correlation/trace IDs, right log levels with no
      PII, context-rich errors that wrap rather than swallow, golden-signal
      instrumentation and propagated trace context, liveness/readiness
      checks, kill switches for risky changes, graceful shutdown, and metric
      cardinality discipline. Use when reviewing logging, metrics, tracing,
      alerts, health checks, feature flags, or deploy/rollback paths.
    shape: diff
    wave: 3
    built_from:
      - { category: 16, source: docs/research/cluster-4-runtime.md#16 }

  - name: reviewing-pr-and-process-hygiene
    description: >
      Reviews the PR itself rather than just the code: size and single
      purpose (~<=400 net LOC), atomic commits with imperative why-bearing
      messages, correct conventional type and breaking-change signaling, risk
      and rollback notes, docs/changelog updated with the API surface, no
      drive-by scope creep, no committed secrets or debug leftovers. Use when
      reviewing a pull request's structure, commits, description, changelog,
      or readiness to merge.
    shape: diff
    wave: 3
    cross_ref: [22]   # primary owner: auditing-documentation-health
    built_from:
      - { category: 24, source: docs/research/cluster-6-evolution.md#24 }
      - { category: 22, source: docs/research/cluster-6-evolution.md#22 }

  - name: auditing-architecture-conformance
    description: >
      Audits a repository for architecture conformance: dependency direction
      violations between layers/modules, cyclic dependencies, reach-arounds
      past a boundary, accidental coupling to internals, and drift between
      the documented architecture and the import graph. A repo-wide /
      scheduled audit rather than a single-diff review. Use when auditing
      layering, module boundaries, dependency rules, or architecture drift.
    shape: repo
    wave: 3
    built_from:
      - { category: 12, source: docs/research/cluster-3-structure.md#12 }

  - name: auditing-dependencies-and-supply-chain
    description: >
      Audits dependencies and the supply chain: known CVEs in direct and
      transitive deps, unpinned or floating versions, lockfile integrity,
      abandoned or low-reputation packages, typosquats, install scripts,
      license compatibility of the dependency tree, and SBOM currency. A
      repo-wide / scheduled audit. Use when auditing package.json, lockfiles,
      requirements, vendored code, or supply-chain risk.
    shape: repo
    wave: 3
    cross_ref: [27]   # primary owner: auditing-compliance-and-provenance
    built_from:
      - { category: 18, source: docs/research/cluster-5-verification.md#18 }
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }

  - name: auditing-config-and-build-hygiene
    description: >
      Audits configuration and build/CI health: config schema-validated at
      startup and fail-fast, secrets out of config files, parity across
      environments, reproducible and hermetic builds, pinned toolchains and
      CI actions, cache correctness, flaky or slow pipelines, and unused or
      drifting config keys. A repo-wide / scheduled audit. Use when auditing
      CI pipelines, Dockerfiles, build scripts, env vars, or config files.
    shape: repo
    wave: 3
    built_from:
      - { category: 19, source: docs/research/cluster-5-verification.md#19 }
      - { category: 26, source: docs/research/cluster-5-verification.md#26 }

  - name: auditing-documentation-health
    description: >
      Audits documentation health across a repository: API-surface-to-docs
      parity, docstring accuracy against current signatures, README
      front-door freshness, runnable examples that still run, ADR coverage
      for non-obvious decisions, changelog discipline, orphaned or
      contradictory docs, and stale diagrams. A repo-wide / scheduled audit.
      Use when auditing docs, READMEs, docstrings, changelogs, ADRs, or
      onboarding material.
    shape: repo
    wave: 3
    built_from:
      - { category: 22, source: docs/research/cluster-6-evolution.md#22 }

  - name: auditing-compliance-and-provenance
    description: >
      Audits compliance, licensing, and provenance: dependency licenses
      compatible with the distribution model, copyleft contamination, missing
      SPDX headers and attribution, code of unclear provenance, PII data
      flows without minimization or retention limits, consent gating for
      telemetry, and SBOM currency. Detects and escalates to humans rather
      than deciding legal questions. A repo-wide / scheduled audit. Use when
      auditing licenses, PII handling, data retention, or provenance.
    shape: repo
    wave: 3
    built_from:
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }
