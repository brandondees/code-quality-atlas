taxonomy_version: v0.9
skills:
  - name: hunting-silent-failures
    description: >
      Reviews changes for swallowed or silently-handled errors — empty
      catch/rescue blocks, ignored returned errors, bare excepts, unhandled
      promise rejections, broad exception catches — and for unsafe fallbacks,
      missing timeouts, and absent retries/circuit-breakers. Use when reviewing
      error handling, exceptions, try/catch, rescue, fallback, resilience,
      timeouts, or resource cleanup on failure paths.
    picker: >
      Where do errors vanish? Swallowed exceptions, silent fallbacks, missing
      timeouts and retries.
    shape: diff
    design: true
    wave: 1
    tier: floor
    cross_ref: [4]    # primary owner: tracing-correctness-and-invariants
    built_from:
      - { category: 2, source: docs/research/cluster-1-correctness.md#2 }
      - { category: 4, source: docs/research/cluster-1-correctness.md#4 }

  - name: reviewing-naming-and-readability
    description: >
      Reviews code for naming and local readability: intention-revealing names
      vs placeholders, function length and cyclomatic/cognitive complexity, deep
      nesting, magic numbers/strings, mixed levels of abstraction, and comment
      accuracy. Use when reviewing readability, naming, complexity, nesting,
      magic values, or comments.
    picker: >
      Can a newcomer read this function? Names, length, nesting, magic values,
      comment accuracy.
    shape: diff
    wave: 1
    built_from:
      - { category: 5, source: docs/research/cluster-2-readability.md#5 }
      - { category: 6, source: docs/research/cluster-2-readability.md#6 }
      - { category: 7, source: docs/research/cluster-2-readability.md#7 }

  - name: reviewing-module-design
    description: >
      Reviews module and type design: cohesion and coupling (via connascence),
      encapsulation, hard-to-misuse interfaces, and making illegal states
      unrepresentable. Use when reviewing class/module structure, interfaces,
      type or data modeling, coupling, or API ergonomics for callers.
    picker: >
      Are the boundaries right? Coupling, encapsulation, interfaces that are
      hard to misuse, illegal states unrepresentable.
    shape: diff
    design: true
    wave: 1
    built_from:
      - { category: 9, source: docs/research/cluster-3-structure.md#9 }
      - { category: 10, source: docs/research/cluster-3-structure.md#10 }

  - name: checking-restraint
    description: >
      Reviews changes for over-engineering — premature abstraction, speculative
      generality, the wrong abstraction, and premature optimization without a
      profile. The restraint / brake-pedal lens. Use when a change adds
      abstraction layers, config knobs, generality, or hand-optimized code, or
      when asking whether a change is doing too much.
    picker: >
      Is this change too much? Premature abstraction or optimization — the
      brake pedal.
    shape: diff
    design: true
    wave: 1
    cross_ref: [15]   # primary owner: reviewing-performance-and-efficiency (counterweight lens here)
    built_from:
      - { category: 11, source: docs/research/cluster-3-structure.md#11 }
      - { category: 15, source: docs/research/cluster-4-runtime.md#15 }

  - name: reviewing-llm-integration
    description: >
      Reviews LLM/AI integration code for prompt-injection surface, the lethal
      trifecta, unvalidated model output, missing eval coverage, unpinned models,
      unbounded token/cost, and PII sent to third-party models. Use when
      reviewing code that calls an LLM or model API, builds prompts, parses
      model output, or wires up agents and tools. Skip when the change has no
      model/LLM call, prompt construction, or model-output handling — ordinary
      code that never touches an AI API.
    picker: >
      Is the model call safe and bounded? Injection surface, output validation,
      evals, token cost, PII.
    shape: diff
    design: true
    wave: 1
    cross_ref: [27]   # primary owner: auditing-compliance-and-provenance
    built_from:
      - { category: 25, source: docs/research/cluster-4-runtime.md#25 }
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }

  - name: reviewing-agentic-safety
    description: >
      Reviews the action/tool surface of agent and tool-using systems — what the
      model is permitted to *do*, distinct from reviewing-llm-integration's review
      of the *model call*: tool least-privilege, approval gates and step/spend
      budgets on autonomous loops, tool metadata and MCP server descriptions as
      untrusted input (tool poisoning), confused-deputy and token-audience
      discipline (no token passthrough), inter-agent authentication,
      sandboxed code execution (no ambient credentials, egress allow-list),
      agent-memory hygiene, action audit trails, and the action-leg mitigations of
      the lethal trifecta. Grounded in OWASP's Top 10 for Agentic Applications
      (ASI01–ASI10) and the MCP security spec. Use when reviewing tool or function
      definitions exposed to a model, an MCP server or client, an autonomous or
      multi-agent loop, agent memory, or code that lets a model take actions. Skip
      when the change has no tools, agents, MCP, or autonomous loop — an ordinary
      model call with no action surface is reviewing-llm-integration's job.
    picker: >
      Is the agent's action surface safe? Tool least-privilege, approval gates &
      step budgets, untrusted tool metadata, sandboxed exec, egress control.
    shape: diff
    design: true
    wave: 5
    built_from:
      - { category: 32, source: docs/research/cluster-4-runtime.md#32 }

  - name: reviewing-threat-model
    description: >
      Threat-models a system or design for security at design time — enumerates
      what an adversary could do boundary by boundary (STRIDE, trust boundaries,
      data-flow, attack trees, abuse cases) and whether each threat is mitigated,
      rather than pattern-matching existing code for vulnerabilities. Works on a
      design doc or RFC when present, and reconstructs the implied design from the
      code/config when absent. Use when asked for a threat model, a security
      architecture review, an attack-surface review, or "what could go wrong" on a
      system, service, or AI agent app — especially one with tools, autonomy, or
      external/untrusted inputs. Skip when the change is a pure code fix with no
      new trust boundaries, components, or data-flows — diff-time vulnerability
      detection is sweeping-for-security's job.
    picker: >
      Enumerate what an adversary could do, boundary by boundary — STRIDE, trust
      boundaries, abuse cases — and whether each threat is mitigated.
    shape: diff
    design: true
    wave: 4
    # cross_ref intentionally absent: reviewing-threat-model is the sole primary owner of #38.
    # sweeping-for-security (#14) owns diff-time vuln detection; these are complementary, not overlapping.
    built_from:
      - { category: 38, source: docs/research/cluster-4-runtime.md#38 }

  - name: reviewing-ai-authored-code
    description: >
      Reviews a change for the failure signature of AI-/machine-authored code,
      independent of who wrote it: hallucinated or typosquatted dependencies
      (slopsquatting), invented or misused APIs and parameters, plausible-but-wrong
      constants and logic that reads fluently, hallucinated internal references to
      symbols that don't exist here, over-helpful unrequested additions (scope
      creep as a generation artifact), the weak-default security signature, tests
      that assert the implementation instead of the spec, fabricated
      comments/citations, and duplication instead of reuse. Flags the signature and
      hands the deep verdict to the owning lens (#18 supply-chain, #14 security, #1
      correctness, #11 restraint). Use when reviewing AI-generated or AI-assisted
      code, a large or unfamiliar diff, or any change that adds dependencies or
      confident-looking constants and APIs — the defects are attribution-agnostic,
      so you need not know a model wrote it.
    picker: >
      Does this carry the AI-authored failure signature? Hallucinated/typosquatted
      packages, invented APIs, confident-but-wrong constants, over-helpful scope.
    shape: diff
    wave: 5
    cross_ref: [18]   # primary owner: auditing-dependencies-and-supply-chain
    built_from:
      - { category: 34, source: docs/research/cluster-4-runtime.md#34 }
      - { category: 18, source: docs/research/cluster-5-verification.md#18 }

  - name: reviewing-agent-legibility
    description: >
      Reviews a change for agent-legibility — whether an AI agent can understand,
      navigate, and safely modify this code within a context budget. The mirror of
      reviewing-ai-authored-code (quality of code *for* AI readers, not *by* them):
      context economy and self-containment (a depth-first slice understandable
      without loading the whole repo — the "40% context rule"), retrieval-friendly
      and AST-navigable structure, local self-explanation at the edit site,
      agent-onboarding files (AGENTS.md / CLAUDE.md) present, accurate, and scoped
      with do-not-touch guardrails, an llms.txt-style index for agent-consumed
      repos, and no agent-hostile patterns (context-budget-blowing megafiles,
      bloated scaffolding, duplicated parallel copies). Use when reviewing a change
      to an AI-/agent-maintained codebase, to agent-onboarding files or repo
      structure an agent must navigate, or any large or scattered change whose
      context economy matters. Defers human readability to #5–#8, agent-operator
      parity to #24, and runtime tool-safety to #32.
    picker: >
      Can an AI agent read, navigate, and safely change this within a context
      budget? Context economy, retrieval-friendly structure, scoped
      AGENTS.md/CLAUDE.md.
    shape: diff
    wave: 5
    built_from:
      - { category: 35, source: docs/research/cluster-2-readability.md#35 }

  - name: reviewing-ethical-design
    description: >
      Reviews a change for diff-visible, code-level ethical / responsible-design
      defects — the non-ML analog of harmful-output review, a sibling of security
      (harm to the user/subject, not via an attacker): dark patterns and deceptive
      flows (sneaking, fabricated urgency/scarcity, misdirection/confirmshaming,
      obstruction, forced action, nagging), manipulative defaults and asymmetric
      choices (pre-checked consent, opt-out harder than opt-in, auto-renew),
      discriminatory business logic in plain conditionals (a hardcoded threshold or
      proxy disadvantaging a group, no model in sight), dishonest state/signals,
      and consent theater. Strictly detect-and-route: name the pattern with
      evidence, then route the decision — consent-as-law to #27/legal, product
      trade-offs to product, a11y mechanics to #23. Use when reviewing
      consent/opt-out flows, defaults, pricing/eligibility conditionals, or
      onboarding/checkout/cancellation funnels. Skip internal code with no
      user-facing behavior; deep model-fairness auditing is out of scope.
    picker: >
      Does this manipulate or disadvantage the user? Dark patterns, manipulative
      defaults, discriminatory conditionals — detect-and-route to product/legal.
    shape: diff
    wave: 5
    built_from:
      - { category: 36, source: docs/research/cluster-4-runtime.md#36 }

  - name: finding-maintainability-hotspots
    description: >
      Scans a repository for maintainability hotspots: high churn × complexity
      files, change-coupling, bus-factor / knowledge concentration, and
      untracked tech debt. A repo-wide / scheduled scan rather than a single-diff
      review. Use when auditing maintainability, tech debt, refactoring targets,
      or risky areas across the codebase.
    picker: >
      Where does the repo hurt most? Churn × complexity, change-coupling,
      bus factor, untracked debt.
    shape: repo
    wave: 1
    built_from:
      - { category: 21, source: docs/research/cluster-6-evolution.md#21 }

  - name: sweeping-for-security
    description: >
      Sweeps changes for security risks: injection (SQL/command/XSS) from
      unparameterized or unencoded untrusted input, missing authorization on
      object references (IDOR), missing segregation of duties / maker-checker on
      high-consequence workflows, hardcoded secrets, weak or homegrown crypto,
      unsafe deserialization, SSRF, CSRF, permissive CORS/TLS settings, and
      sensitive data in logs or URLs. Use when reviewing auth, authorization
      workflows, user input, queries, secrets, crypto, cookies, file paths, or
      any code handling untrusted data.
    picker: >
      Can an attacker abuse this? Injection, authorization, secrets, crypto,
      untrusted data.
    shape: diff
    design: true
    wave: 2
    tier: floor
    built_from:
      - { category: 14, source: docs/research/cluster-4-runtime.md#14 }

  - name: reviewing-performance-and-efficiency
    description: >
      Reviews changes for performance and efficiency problems: N+1 queries,
      await-in-loop and chatty per-item I/O, accidental O(n²) on hot paths,
      recomputed expensive values, caches without invalidation, buffering
      whole payloads instead of streaming, allocation pressure, bundle/startup
      bloat, and per-request cloud cost. Demands a profile before accepting
      optimization claims. Use when reviewing queries in loops, hot paths,
      caching, large payloads, or anything justified by "performance."
    picker: >
      Will this be slow or expensive at scale? N+1, O(n²) hot paths, caching,
      payload buffering.
    shape: diff
    design: true
    wave: 2
    built_from:
      - { category: 15, source: docs/research/cluster-4-runtime.md#15 }

  - name: reviewing-test-quality
    description: >
      Reviews tests for quality: behavior vs implementation coupling,
      over-mocking, meaningful branch/edge coverage on the diff, regression
      tests for bug fixes, isolation and determinism (no shared state, real
      clocks, or unseeded randomness), right level per the pyramid/trophy, and
      disabled/focused tests sneaking in. Use when reviewing test files, test
      coverage, mocks, fixtures, flaky tests, or a bug fix's tests.
    picker: >
      Do the tests prove anything? Behavior coupling, over-mocking, edge
      coverage, determinism.
    shape: diff
    wave: 2
    built_from:
      - { category: 17, source: docs/research/cluster-5-verification.md#17 }

  - name: reviewing-migration-and-data-safety
    description: >
      Reviews schema migrations and data changes for safety: backward
      compatibility with the running app (expand/migrate/contract), table
      locks from NOT NULL/index/FK on large tables, unbatched backfills,
      missing dual-write during transitions, irreversible or destructive DDL,
      and integrity constraints left to app code. Use when reviewing
      migrations, ALTER TABLE, backfills, schema or data-format changes, or
      anything touching persistence. Skip when the change touches no schema,
      migration, backfill, or persisted data format — pure in-memory or
      stateless logic with no durable store behind it.
    picker: >
      Can this migration lock tables or lose data? Expand/contract, backfills,
      reversibility.
    shape: diff
    design: true
    wave: 2
    tier: floor
    built_from:
      - { category: 20, source: docs/research/cluster-5-verification.md#20 }

  - name: reviewing-accessibility-and-i18n
    description: >
      Reviews UI changes for accessibility and internationalization: semantic
      HTML vs div-with-onclick, keyboard operability and focus management,
      accessible names on icon buttons and inputs, contrast, ARIA misuse,
      hardcoded user-facing strings, naive pluralization, non-locale-aware
      number/date/currency formatting, and RTL-unsafe layout. Use when
      reviewing components, templates, markup, forms, modals, UI text, or
      anything user-facing. Skip when the change has no user-facing surface —
      backend, CLI, library, or infra code with no rendered UI or localized
      strings.
    picker: >
      Can everyone use this UI? Keyboard, screen readers, contrast, locales,
      RTL.
    shape: diff
    wave: 2
    built_from:
      - { category: 23, source: docs/research/cluster-6-evolution.md#23 }

  - name: tracing-correctness-and-invariants
    description: >
      Traces whether a change actually does what it claims: invariants and
      postconditions preserved on every branch, boundary values (0, 1, n-1,
      empty, max, negative) handled, off-by-one in ranges and loop bounds,
      null/undefined checked at boundaries, exhaustive switch/match, resource
      cleanup on all paths, money as integer minor units, monotonic clocks for
      durations, UTC for storage. Use when reviewing logic, algorithms, loops,
      conditionals, edge cases, or whether the implementation matches the
      stated intent.
    picker: >
      Does the code do what it claims? Invariants, boundaries, off-by-one,
      resource cleanup.
    shape: diff
    design: true
    wave: 3
    tier: floor
    built_from:
      - { category: 1, source: docs/research/cluster-1-correctness.md#1 }
      - { category: 4, source: docs/research/cluster-1-correctness.md#4 }

  - name: reviewing-concurrency-and-async
    description: >
      Reviews concurrent and async code for races and ordering bugs: shared
      mutable state without synchronization, check-then-act spanning an await,
      lost updates from interleaved requests, lock ordering, unawaited
      promises, accidental sequential awaits, non-idempotent message
      consumers, exactly-once assumptions, and missing cancellation/timeout
      propagation. Use when reviewing threads, async/await, promises, locks,
      queues, message handlers, or anything two callers can run at once. Skip
      when the code is single-threaded and synchronous with no shared mutable
      state, async/await, or message handling — nothing two callers race on.
    picker: >
      What breaks when two run at once? Races, lost updates, unawaited
      promises, idempotency.
    shape: diff
    design: true
    wave: 3
    tier: floor
    built_from:
      - { category: 3, source: docs/research/cluster-1-correctness.md#3 }

  - name: checking-idioms-and-consistency
    description: >
      Checks that a change follows the project's own conventions and the
      language/framework's idioms: formatter applied, idiomatic constructs
      over clumsy equivalents, recurring problems solved the same way the
      codebase already does, no second parallel way to do the same thing,
      consistent naming/casing/imports/file layout. Use when reviewing style,
      conventions, idioms, framework usage, or consistency with the rest of
      the codebase.
    picker: >
      Does this look like the rest of the codebase? Conventions, idioms, no
      second parallel way.
    shape: diff
    wave: 3
    built_from:
      - { category: 8, source: docs/research/cluster-2-readability.md#8 }

  - name: reviewing-api-contract-safety
    description: >
      Reviews public API and contract changes for safety: backward
      compatibility (versioned/deprecated if breaking), hard-to-misuse
      shapes, "when in doubt leave it out" on new surface, typed and stable
      error contracts, idempotency for unsafe operations, pagination and rate
      limits on collections, contract tests, and no internal-representation
      leakage. Use when reviewing REST/GraphQL/RPC endpoints, request or
      response shapes, SDK surface, webhooks, or any consumer-facing contract.
      Skip when the change is internal-only with no consumer-facing surface —
      private helpers or implementation details no external caller depends on.
    picker: >
      Will this break a consumer? Compatibility, error contracts, idempotency,
      pagination.
    shape: diff
    design: true
    wave: 3
    built_from:
      - { category: 13, source: docs/research/cluster-3-structure.md#13 }

  - name: reviewing-observability-and-operability
    description: >
      Reviews changes for production operability: structured logs with
      consistent fields and correlation/trace IDs, right log levels with no
      PII, context-rich errors that wrap rather than swallow, golden-signal
      instrumentation and propagated trace context, liveness/readiness
      checks, kill switches for risky changes, graceful shutdown, and metric
      cardinality discipline. Use when reviewing logging, metrics, tracing,
      alerts, health checks, feature flags, or deploy/rollback paths.
    picker: >
      Can you debug this in production at 3am? Logs, traces, health checks,
      kill switches, rollback.
    shape: diff
    design: true
    wave: 3
    built_from:
      - { category: 16, source: docs/research/cluster-4-runtime.md#16 }

  - name: reviewing-pr-and-process-hygiene
    description: >
      Reviews the PR itself rather than just the code: size and single
      purpose (~<=400 net LOC), atomic commits with imperative why-bearing
      messages, correct conventional type and breaking-change signaling, risk
      and rollback notes, docs/changelog updated with the API surface, no
      drive-by scope creep, no committed secrets or debug leftovers. Use when
      reviewing a pull request's structure, commits, description, changelog,
      or readiness to merge.
    picker: >
      Is the PR itself reviewable? Size, atomic commits, description, scope
      creep, changelog.
    shape: diff
    wave: 3
    cross_ref: [22]   # primary owner: auditing-documentation-health
    built_from:
      - { category: 24, source: docs/research/cluster-6-evolution.md#24 }
      - { category: 22, source: docs/research/cluster-6-evolution.md#22 }

  - name: auditing-architecture-conformance
    description: >
      Audits a repository for architecture conformance: dependency direction
      violations between layers/modules, cyclic dependencies, reach-arounds
      past a boundary, accidental coupling to internals, and drift between
      the documented architecture and the import graph. A repo-wide /
      scheduled audit rather than a single-diff review. Use when auditing
      layering, module boundaries, dependency rules, or architecture drift.
    picker: >
      Does the import graph still match the intended architecture? Layers,
      cycles, reach-arounds.
    shape: repo
    wave: 3
    built_from:
      - { category: 12, source: docs/research/cluster-3-structure.md#12 }

  - name: auditing-dependencies-and-supply-chain
    description: >
      Audits dependencies and the supply chain: known CVEs in direct and
      transitive deps, unpinned or floating versions, lockfile integrity,
      abandoned or low-reputation packages, typosquats, install scripts,
      license compatibility of the dependency tree, and SBOM currency. A
      repo-wide / scheduled audit. Use when auditing package.json, lockfiles,
      requirements, vendored code, or supply-chain risk.
    picker: >
      Is the dependency tree safe? CVEs, pinning, typosquats, install scripts,
      licenses.
    shape: repo
    wave: 3
    cross_ref: [27]   # primary owner: auditing-compliance-and-provenance
    built_from:
      - { category: 18, source: docs/research/cluster-5-verification.md#18 }
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }

  - name: auditing-config-and-build-hygiene
    description: >
      Audits configuration and build/CI health: config schema-validated at
      startup and fail-fast, secrets out of config files, parity across
      environments, reproducible and hermetic builds, pinned toolchains and
      CI actions, cache correctness, flaky or slow pipelines, and unused or
      drifting config keys. A repo-wide / scheduled audit. Use when auditing
      CI pipelines, Dockerfiles, build scripts, env vars, or config files.
    picker: >
      Are config and CI trustworthy? Secrets, env parity, reproducible pinned
      builds, cache correctness.
    shape: repo
    wave: 3
    built_from:
      - { category: 19, source: docs/research/cluster-5-verification.md#19 }
      - { category: 26, source: docs/research/cluster-5-verification.md#26 }

  - name: auditing-documentation-health
    description: >
      Audits documentation health across a repository: API-surface-to-docs
      parity, docstring accuracy against current signatures, README
      front-door freshness, runnable examples that still run, ADR coverage
      for non-obvious decisions, changelog discipline, orphaned or
      contradictory docs, and stale diagrams. A repo-wide / scheduled audit.
      Use when auditing docs, READMEs, docstrings, changelogs, ADRs, or
      onboarding material.
    picker: >
      Do the docs still tell the truth? API parity, stale examples, ADR
      coverage, changelog discipline.
    shape: repo
    wave: 3
    built_from:
      - { category: 22, source: docs/research/cluster-6-evolution.md#22 }

  - name: auditing-compliance-and-provenance
    description: >
      Audits compliance, licensing, and provenance: dependency licenses
      compatible with the distribution model, copyleft contamination, missing
      SPDX headers and attribution, code of unclear provenance, PII data
      flows without minimization or retention limits, consent gating for
      telemetry, and SBOM currency. Detects and escalates to humans rather
      than deciding legal questions. A repo-wide / scheduled audit. Use when
      auditing licenses, PII handling, data retention, or provenance.
    picker: >
      Any licensing, PII, or provenance exposure? Detect and escalate to
      humans — never decide legal questions.
    shape: repo
    wave: 3
    built_from:
      - { category: 27, source: docs/research/cluster-6-evolution.md#27 }

  - name: reviewing-decision-lifecycle
    description: >
      Reviews a decision as it is made — an ADR, RFC, design doc, adoption PR, or
      deprecation/rollout plan — rather than the code that implements it: is the
      choice (dependency, framework, platform, build-vs-buy) justified against
      cheaper options; is lock-in and exit cost assessed; is the rationale and its
      assumptions recorded with a revisit-trigger; is retirement planned on a
      schedule with a sunset date and migration path. Use when reviewing an
      architecture decision record, an RFC, a dependency or technology adoption, a
      vendor or build-vs-buy choice, or a deprecation/sunset plan.
    picker: >
      Is this decision sound and recorded? Adoption justification, lock-in/exit,
      ADR assumptions, revisit-triggers, planned retirement.
    shape: decision
    wave: 4
    built_from:
      - { category: 29, source: docs/research/cluster-6-evolution.md#29 }

  - name: auditing-decision-record-currency
    description: >
      Audits the decision records already in a repository (ADRs/RFCs on disk),
      on a schedule rather than at authoring time: status-graph consistency
      (an accepted record contradicted by a later one with no supersedes
      link, or a decision the code has visibly reversed), a revisit-trigger
      whose stated condition current repo signals suggest may now hold, a
      record with no checkable revisit-trigger at all, an adopted technology
      now end-of-life or on hold with no revisit noted, and orphaned records
      nothing in the repo still implements. Detects and routes revisit
      signals to the decision's owner rather than reversing the call itself.
      A repo-wide / scheduled audit — the periodic-currency companion to
      reviewing-decision-lifecycle's authoring-time review. Use when auditing
      an ADR directory, a decisions/RFC archive, or a whole-repo health scan.
      Skip when the repo has no decision-record directory or archive at all.
    picker: >
      Do the repo's existing decision records still hold? Status-graph
      consistency, revisit-triggers due, EOL adoptions, orphaned records.
    shape: repo
    wave: 6
    built_from:
      - { category: 39, source: docs/research/cluster-6-evolution.md#39 }

  - name: auditing-enforcement-and-meta-artifacts
    description: >
      Audits the enforcement apparatus and meta-artifacts wrapped around the code,
      as their own reviewable surface: suppression hygiene (blanket or unjustified
      `# noqa` / `eslint-disable` / `# type: ignore`, unused/stale suppressions, a
      lint or type baseline growing rather than shrinking), monitoring config as an
      artifact (cause-based or unactionable alerts, alert rules with no runbook or
      `for:` duration, dashboards referencing renamed/dead metrics, click-ops that
      drift instead of monitoring-as-code), and codegen-to-source drift (checked-in
      generated artifacts that can silently diverge from their generator/spec with
      no regenerate-and-diff gate in CI). A repo-wide / scheduled audit rather than
      a single-diff review. Use when auditing lint/type suppressions, alert rules,
      dashboards, or checked-in generated code.
    picker: >
      Is the enforcement apparatus healthy? Suppression hygiene & baseline trend,
      actionable alerts/monitoring-as-code, codegen-source drift gate.
    shape: repo
    wave: 4
    built_from:
      - { category: 30, source: docs/research/cluster-5-verification.md#30 }

  - name: reviewing-resilience-and-scalability
    description: >
      Reviews a change or design for operational resilience and scale: unbounded
      queues/buffers/result sets, missing timeouts and failure plans on calls to
      other services, blast radius and bulkheading, retry budgets and idempotency,
      in-process state that blocks horizontal scaling, single-writer bottlenecks,
      recoverability (RTO/RPO and tested restore), graceful degradation under
      overload, and multi-tenant isolation. Design-time operability — distinct
      from #16's runtime observability. Use when reviewing a new queue, cache,
      stateful service, failover/HA/DR design, capacity or scaling plan, or a call
      to a dependency that could be slow or down. Skip when the change is a small,
      stateless local edit with no new dependency call, queue, shared state, or
      scaling/recovery surface.
    picker: >
      Will it survive failure and scale? Unbounded queues, timeouts and blast
      radius, retries, statelessness, RTO/RPO — design-time, not #16's runtime.
    shape: diff
    design: true
    wave: 4
    built_from:
      - { category: 28, source: docs/research/cluster-4-runtime.md#28 }

  - name: auditing-infrastructure-as-code
    description: >
      Audits infrastructure-as-code manifests (Terraform/OpenTofu, Kubernetes and
      Helm, CloudFormation, Pulumi) as code that provisions production: the blast
      radius of a change (in-place update vs replace/destroy of stateful
      resources), public exposure (`0.0.0.0/0`, public buckets), over-broad or
      wildcard IAM, secrets in plaintext or Terraform state, unpinned modules and
      providers, drift between declared and live infra, missing container resource
      limits / non-root / read-only roots, and unmaintained or soft-failed
      scanners. Orchestrates and judges blast-radius; defers the security verdict
      to humans and to sweeping-for-security. A repo-wide / scheduled audit. Use
      when auditing Terraform, Kubernetes, Helm, or CloudFormation. Skip when the
      repo or change contains no infrastructure-as-code manifests.
    picker: >
      Does this infra change expose or destroy something? Blast radius, public
      access, wildcard IAM, secrets in state, drift.
    shape: repo
    wave: 4
    built_from:
      - { category: 31, source: docs/research/cluster-5-verification.md#31 }

  - name: reviewing-install-and-upgrade-experience
    description: >
      Reviews a change for the experience of the people who consume this software
      — installing, configuring, and upgrading it — distinct from the
      decision-lifecycle lens's "should we adopt this dependency" call and from
      end-user product UX. Covers setup friction and undocumented prerequisites;
      configuration ergonomics (safe defaults, schema validation, fail-fast
      actionable errors, backward-compatible keys); and upgrade/migration
      smoothness — especially whether a consumer or a code agent can complete and
      verify the upgrade from the docs alone: a codemod or migration command,
      SemVer-correct breaking-change signaling, deprecation windows over silent
      removals, and a downgrade path. Use when reviewing installers, setup/init
      scripts, packaging, CLI and config surfaces, upgrade or migration guides, or
      release/versioning changes — or anything a downstream project adopts (a
      tool, plugin, template, or library). Skip when the change has no
      consumer-facing install, config, or upgrade surface.
    picker: >
      Can a consumer install, configure, and upgrade this cleanly — even hand it
      to an agent? Setup friction, config UX, version-bump smoothness, migration
      path.
    shape: diff
    design: true
    wave: 4
    built_from:
      - { category: 33, source: docs/research/cluster-6-evolution.md#33 }

  - name: reviewing-interoperability
    description: >
      Reviews a change for interoperability — whether the code correctly speaks
      the external standards and protocols it claims to (ISO/IEC 25010:2023).
      Consolidates conformance checks scattered across other
      lenses: HTTP semantics (safe/idempotent methods, status codes, conditional
      requests, caching); OAuth 2.0 / OIDC flow correctness (exact redirect_uri,
      state/nonce, PKCE); Semantic Versioning and wire/format back-compat; RFC
      formats (date, URI, email, JSON, CSV); Unicode normalization and encoding
      (NFC, UTF-8, the YAML "Norway" class); cron dialects (POSIX vs. Quartz);
      OpenTelemetry semantic conventions; and co-existence (ports, global state,
      shared paths). Use when a change parses or emits a standard format, calls or
      implements an external protocol or auth flow, versions a published surface,
      or serializes data another system reads. Owns conformance to an external
      standard; defers the contract we author to #13, internal correctness to #4,
      idiom to #8, config to #26. Skip changes with no boundary-crossing standard.
    picker: >
      Does the code correctly speak external standards? HTTP/OAuth semantics,
      SemVer, RFC date/URI/email formats, Unicode, cron dialects, OTel semconv.
    shape: diff
    wave: 5
    built_from:
      - { category: 37, source: docs/research/cluster-4-runtime.md#37 }

  - name: reviewing-artifact-conventions
    description: >
      Reviews a standardized non-source artifact against its own published
      "well-formed X" standard rather than as application code — the artifact
      review shape (D15), presence-activated. On detecting a supported artifact it
      loads that artifact's rubric and reviews against it. Supported artifact: a
      SKILL.md / agent-skill definition, reviewed against Anthropic's
      skill-authoring best practices (trigger-rich frontmatter within limits, a
      lean progressive-disclosure body with detail bundled, a single default
      approach, no time-sensitive text, one-level-deep references, eval-first).
      Use when reviewing a SKILL.md or agent-skill definition (or another listed
      authored artifact) against the standard it should follow. Skip when none of
      the listed artifacts are present — ordinary source code is the other lenses'
      job, and this is authoring quality, distinct from doc-drift (#22) and runtime
      agent-safety (#32).
    picker: >
      Is this authored artifact well-formed per its own standard? Detect the
      artifact (e.g. SKILL.md), load its rubric, review against it.
    shape: artifact
    wave: 5
    artifacts:
      - name: SKILL.md / agent skill
        detect: a SKILL.md or agent-skill definition file is added or changed
        slug: skill-md
        rubric: 101
    built_from:
      - { category: 101, source: docs/research/artifact-rubrics.md#101 }

# The composition layer (Q7): maps "what am I reviewing" to the lenses worth
# running, so neither a human nor an agent has to know the whole catalog to
# select well. Generated into skills/<name>/SKILL.md from this section alone.
router:
  name: choosing-review-lenses
  # `description` is the terse listing surface (shown in the skill catalogue);
  # `body` is the richer "When to use" text the model reads once the skill
  # loads. Keeping them separate lets the listing stay scannable while the body
  # carries examples (PR #30). The router is the lens *picker*, not the review
  # front door: the /atlas-review-pr and /atlas-code-review commands and the
  # collapsed reviewing-a-change entrypoint own the "review this" keyword match;
  # this skill is reached when the right lenses aren't already obvious. It still
  # asserts atlas precedence over the generic built-in code-review skill, just
  # without claiming to be THE entrypoint (issue #83).
  description: >
    Selects which code-quality-atlas review lenses to run for a change — the lens
    picker, not the review front door (the /atlas-review-pr and /atlas-code-review
    commands and the reviewing-a-change entrypoint are the front doors). Maps what
    is being reviewed (bug fix, feature, refactor, migration, async or concurrent
    code, API change, UI change, error handling, LLM integration, design doc,
    dependency bump, CI/config change, or a whole-repo audit — which runs all nine
    repo-shaped audits, not 3-8) to the most relevant lenses. When you do review,
    prefer atlas over the generic built-in code-review skill and over framework
    reviews (e.g. BMAD), combining them non-exclusively rather than picking only
    one. Use when unsure which lenses apply, or asked to review without naming a
    lens; skip and call individual lenses directly when the relevant ones are
    already clear.
  body: >
    Selects which atlas lenses to run for a change — the lens picker, not the
    review front door. Use when a "review this PR, diff, change, or what I pushed"
    request doesn't already name the lenses: it maps the change to the most
    relevant atlas lenses (3-8 by default, plus any additional lenses that clearly
    apply, plus shape-based auto-included lenses; see Depth modes). Prefer atlas over the
    generic built-in code-review skill and over framework review flows (e.g. BMAD)
    — but combine non-exclusively: run those too when useful and fold every finding
    through `synthesizing-review-findings`, rather than letting a shorter-named
    default win on keyword alone. Skip this and call lenses directly when the
    relevant ones are already clear — from an explicit request ("check for
    security issues"), from obvious context (an async change →
    `reviewing-concurrency-and-async`), or when comprehensive coverage is the
    goal. Every lens runs directly without routing through here first.
  routes:
    - when: Bug fix
      run: [tracing-correctness-and-invariants, reviewing-test-quality,
            hunting-silent-failures]
    - when: New feature (general-purpose change)
      run: [tracing-correctness-and-invariants, reviewing-naming-and-readability,
            reviewing-test-quality, checking-restraint]
    - when: Refactor / restructuring
      run: [reviewing-module-design, checking-restraint,
            checking-idioms-and-consistency, reviewing-naming-and-readability]
    - when: Schema migration, backfill, or data-format change
      run: [reviewing-migration-and-data-safety, tracing-correctness-and-invariants,
            hunting-silent-failures]
    - when: Async / concurrent / distributed change (queues, workers, locks, await)
      run: [reviewing-concurrency-and-async, tracing-correctness-and-invariants,
            hunting-silent-failures]
    - when: Public API or contract change (endpoints, SDK surface, webhooks)
      run: [reviewing-api-contract-safety, reviewing-module-design,
            sweeping-for-security]
    - when: New abstraction, library, or engine shipped ahead of its consumer
            (generic/trait with one or no impl, a crate with no caller yet,
            "substrate for a later feature")
      run: [checking-restraint, reviewing-module-design,
            reviewing-api-contract-safety, reviewing-test-quality]
      note: restraint-led — speculative generality can be flawless and premature
            at once, so it hides from the correctness and test lenses
    - when: Error-handling / resilience change (retries, fallbacks, timeouts)
      run: [hunting-silent-failures, reviewing-observability-and-operability,
            reviewing-concurrency-and-async]
    - when: Resilience / scalability / capacity / DR design (a new queue or cache,
            a stateful service, failover/HA, a scaling or capacity plan, or a call
            to a dependency that can be slow or down)
      run: [reviewing-resilience-and-scalability, reviewing-concurrency-and-async,
            reviewing-observability-and-operability]
      note: "design-time operability — blast radius, backpressure, statelessness,
            RTO/RPO; pairs with #16 for the runtime-instrumentation side"
    - when: UI / frontend change (components, templates, user-facing text)
      run: [reviewing-accessibility-and-i18n, checking-idioms-and-consistency,
            reviewing-naming-and-readability]
    - when: Auth, user input, or anything handling untrusted data
      run: [sweeping-for-security, hunting-silent-failures,
            tracing-correctness-and-invariants]
    - when: Performance-motivated change ("this makes it faster")
      run: [reviewing-performance-and-efficiency, checking-restraint,
            tracing-correctness-and-invariants]
    - when: LLM / model-API integration (a model call, prompt construction, or
            model-output handling — no tools or autonomous loop)
      run: [reviewing-llm-integration, sweeping-for-security, checking-restraint]
    - when: Agent / tool-use change — a tool or function definition exposed to a
            model, an MCP server or client, an autonomous or multi-agent loop,
            agent memory, or any code that lets a model take actions
      run: [reviewing-agentic-safety, reviewing-llm-integration,
            sweeping-for-security]
      note: "the action/tool surface (what the model may *do*) — #32 owns it; the
            model call itself is #25, the authz verdict #14"
    - when: Threat model / security-architecture review (a system or AI agent app,
            with or without a design doc)
      run: [reviewing-threat-model, sweeping-for-security, reviewing-agentic-safety,
            reviewing-llm-integration]
      note: "enumeration-led — #38 builds the model and delegates the deep verdict to
            the topical security lenses"
    - when: AI-generated or AI-assisted change, a large or unfamiliar diff, or any
            change that adds dependencies or confident-looking constants/APIs
      run: [reviewing-ai-authored-code, tracing-correctness-and-invariants,
            sweeping-for-security]
      note: "attribution-agnostic; #18 owns the supply-chain verdict, #14 the
            security one"
    - when: Change to an AI-/agent-maintained codebase, to agent-onboarding files
            (AGENTS.md/CLAUDE.md, llms.txt) or repo structure an agent must
            navigate, or a large/scattered change whose context economy matters
      run: [reviewing-agent-legibility, reviewing-naming-and-readability,
            checking-restraint]
      note: "the agent-as-reader vantage — mirror of #34; context economy,
            retrieval-friendly structure, scoped agent onboarding"
    - when: User-facing flow that could manipulate or disadvantage a person —
            consent / opt-out, defaults, pricing or eligibility conditionals,
            onboarding / checkout / cancellation funnels
      run: [reviewing-ethical-design, reviewing-accessibility-and-i18n,
            sweeping-for-security]
      note: "detect-and-route — dark patterns, manipulative defaults,
            discriminatory conditionals; consent-as-law routes to #27, product
            trade-offs to product, a11y mechanics to #23"
    - when: Logging, metrics, alerts, feature flags, deploy/rollback paths
      run: [reviewing-observability-and-operability, sweeping-for-security]
    - when: Tests-only change
      run: [reviewing-test-quality, checking-idioms-and-consistency]
    - when: Docs-only change (README, `docs/**`, comments)
      run: [reviewing-naming-and-readability]
      note: "auditing-documentation-health auto-includes on this shape too —
            scoped to the changed files, not the whole repo; kept out of this
            row's run list since it is repo-shaped and mixing it with a
            diff-shaped lens here would drop it from the collapsed diff
            entrypoint"
    - when: Design doc / plan / RFC (no code yet)
      run: [tracing-correctness-and-invariants, reviewing-concurrency-and-async,
            reviewing-migration-and-data-safety, reviewing-api-contract-safety]
      note: pick by the design's domain, from design-capable (◆) lenses only
    - when: Dependency add or bump
      run: [auditing-dependencies-and-supply-chain, checking-restraint]
    - when: CI / build / config change
      run: [auditing-config-and-build-hygiene, sweeping-for-security]
    - when: Install / setup / packaging change, an upgrade or migration guide, a
            config or CLI surface, or anything a downstream project adopts (a
            tool, plugin, template, or library)
      run: [reviewing-install-and-upgrade-experience, reviewing-api-contract-safety,
            auditing-documentation-health]
      note: the adopter-facing experience — setup friction, config UX, and a
            version-bump a consumer or an agent can complete and verify
    - when: Change that parses or emits a standard format or speaks an external
            protocol — an HTTP/REST client or handler, an OAuth/OIDC or other
            auth flow, date / URL / email / CSV / JSON serialization, a version
            bump on a published surface, a cron expression, or telemetry
            attributes
      run: [reviewing-interoperability, reviewing-api-contract-safety,
            tracing-correctness-and-invariants]
      note: "does the code correctly speak the external standard — HTTP/OAuth
            semantics, RFC formats, SemVer, Unicode, cron dialect, OTel semconv;
            #13 owns the contract we author, #4 internal correctness, #14 the
            auth-flow security verdict"
    - when: Infrastructure-as-code change (Terraform/OpenTofu, Kubernetes/Helm,
            CloudFormation manifests)
      run: [auditing-infrastructure-as-code, sweeping-for-security]
      note: "repo-shaped — judges blast radius, public exposure, IAM scope, and
            declared-vs-live drift; #14 owns the security verdict"
    - when: A standardized authored artifact rather than source code — a SKILL.md
            or agent-skill definition (more artifact rubrics to come)
      run: [reviewing-artifact-conventions]
      note: artifact-shaped — detect the artifact, then review it against its own
            published standard, not as application code
    - when: Any pull request (the PR artifact itself, on top of content lenses)
      run: [reviewing-pr-and-process-hygiene]
    - when: Whole-repo health audit (scheduled / cron)
      run: [finding-maintainability-hotspots, auditing-architecture-conformance,
            auditing-dependencies-and-supply-chain, auditing-config-and-build-hygiene,
            auditing-documentation-health, auditing-compliance-and-provenance,
            auditing-enforcement-and-meta-artifacts, auditing-infrastructure-as-code,
            auditing-decision-record-currency]
      note: the nine repo-shaped audits; run independently, not as one pass
            (auditing-infrastructure-as-code only where IaC manifests exist;
            auditing-decision-record-currency only where a decision-record
            directory exists)
    - when: Enforcement config — lint/type suppressions, alert rules or dashboards,
            or checked-in generated artifacts
      run: [auditing-enforcement-and-meta-artifacts]
      note: repo-shaped — scans suppression accretion and codegen/monitoring drift
            across the tree, not a single diff
    - when: A decision, not a diff — an ADR / RFC / design doc, a dependency or
            technology adoption, a build-vs-buy or vendor choice, or a
            deprecation / sunset plan
      run: [reviewing-decision-lifecycle, checking-restraint,
            reviewing-api-contract-safety]
      note: "decision-shaped — reviews the choice and its record (rationale,
            assumptions, exit), not implementation code; pair with the
            design-capable (◆) lenses for the decision's domain.
            reviewing-decision-lifecycle auto-includes on this shape even if
            ranking would otherwise drop it"
    - when: A repository's existing decision-record archive (an ADR/RFC directory
            already on disk), swept on a schedule rather than reviewed as it's
            being authored
      run: [auditing-decision-record-currency]
      note: "repo-shaped — status-graph consistency, revisit-triggers plausibly
            due, EOL adoptions, and orphaned records; #29 owns the authoring-time
            call, this only checks whether time has invalidated an existing one"

# The other half of composition (Q7): once the router's chosen lenses each emit
# findings, this merges them into one report — deduplicated, conflicts
# reconciled, severity-ranked, single verdict. Generated into
# skills/<name>/SKILL.md from this section alone (built_from: []), so manifest
# edits regenerate it and docs drift never flags it. Fan-out stays advisory by
# default but the finding contract lets a harness mechanize the same merge (D12).
synthesizer:
  name: synthesizing-review-findings
  description: >
    Merges the findings of several code-quality-atlas lenses — and of any other
    review method run alongside them (the built-in code-review skill, a framework
    review like BMAD, linter output, or human notes) — into one review:
    deduplicates issues raised by more than one source, reconciles lenses that
    pull opposite ways (e.g. restraint vs. coverage, cache vs. profile), ranks
    by severity, and ends on a single block/approve verdict. Use after running any
    set of atlas review lenses (and any companion reviewers) on a change —
    typically 3-8 in standard review mode, uncapped in comprehensive mode — when
    assembling multi-source review output into one report, or when overlapping
    findings need deduplicating and prioritizing.
  severity_order: [Blocker, Major, Minor, Nit]
  tensions:
    - between: [checking-restraint, reviewing-module-design]
      about: a new abstraction or boundary — one lens brakes, one wants the seam
      resolve: >
        Favor the simplest design the current requirements justify; add the
        boundary only once a second concrete consumer exists. Restraint wins
        until then.
    - between: [checking-restraint, reviewing-performance-and-efficiency]
      about: hand-optimization without a profile
      resolve: >
        No optimization lands without a profile showing the hot path.
        Performance wins only on measured evidence; otherwise keep the simple
        version.
    - between: [checking-restraint, reviewing-test-quality]
      about: how much test coverage is enough
      resolve: >
        Cover the behavior and a regression test for any fixed bug; stop at
        coverage that only pins implementation detail. More tests is not
        automatically better.
    - between: [checking-restraint, reviewing-api-contract-safety]
      about: new validation or surface "to be safe" vs. leaving it out
      resolve: >
        "When in doubt, leave it out" — minimal new public surface wins; add
        validation only on surface that actually ships now.
    - between: [reviewing-performance-and-efficiency, reviewing-naming-and-readability]
      about: a fast but cryptic form vs. a clear but slower one
      resolve: >
        Keep the readable form unless a profile proves the clear version is the
        bottleneck; if the fast form must stay, require a comment explaining why.
    - between: [checking-restraint, reviewing-resilience-and-scalability]
      about: defensive resilience machinery (retries, circuit breakers, multi-region,
        extra replicas) vs. simplicity
      resolve: >
        Add resilience in proportion to the availability/scale target and the
        failure modes the system will actually face; do not engineer for scale or
        failures with no stated requirement. Restraint wins absent an SLO or scale
        target — but a real unbounded queue, missing timeout, or untested restore
        is a correctness/operability defect, not gold-plating, and stands.
    - between: [reviewing-observability-and-operability, auditing-compliance-and-provenance]
      about: how much to log for operability vs. keeping PII and secrets out of logs
      resolve: >
        Log enough to operate and debug, but never PII, secrets, or regulated
        data in the clear — redact or tokenize at the logging boundary. Privacy
        wins on any field that could identify a person; add scrubbed, structured
        fields rather than dropping the observability.
    - between: [reviewing-performance-and-efficiency, reviewing-accessibility-and-i18n]
      about: a leaner/faster UI vs. accessible markup and assistive-tech support
      resolve: >
        Accessibility is a correctness requirement, not an optimization to trade
        away. Keep the accessible markup and hit the performance target another
        way (lazy-load, code-split, cache). Drop a11y only against a measured
        budget proving no other path exists — which is almost never.
    - between: [checking-restraint, reviewing-install-and-upgrade-experience]
      about: backward-compat shims and deprecation windows for consumers vs.
        removing the old path now
      resolve: >
        Keep the old path working for one deprecation window with a warning that
        names the replacement whenever the project has external consumers; remove
        in place only for internal-only or never-released surface. Consumer
        smoothness wins while real adopters exist; restraint wins when there are
        none.
    - between: [checking-idioms-and-consistency, finding-maintainability-hotspots]
      about: matching the existing pattern vs. changing it to reduce future churn
      resolve: >
        Stay consistent with the established idiom by default; diverge only when
        the current pattern is a demonstrated maintenance hotspot (high
        change-amplification or repeated edits) and the new form measurably lowers
        that cost. Consistency wins until evolvability has evidence.
    - between: [sweeping-for-security, reviewing-ethical-design]
      about: added friction or a confirmation step — a protective safety control
        vs. manipulative obstruction
      resolve: >
        Keep friction that protects the user or prevents abuse (confirmations on
        destructive or irreversible actions, step-up auth on high-consequence
        operations, a cooling-off period); cut friction that serves the business
        against the user's clear intent (hard-to-cancel, buried opt-out,
        roach-motel flows). Security's protective friction wins; obstruction does
        not — the test is whose interest the friction serves, not its presence.
modes:
  - name: triage
    breadth: >
      the critical tier only — correctness, security, data-safety, and concurrency
    floor: Major
    triggers: [triage, quick review, fast check, pre-merge gate]
    note: >
      A pre-merge gate: run only the critical-tier lenses and report Major and above.
  - name: review
    breadth: >
      the top 3-8 lenses by relevance, plus any additional relevant lenses the
      reviewer judges worthwhile (the default; not a strict cap)
    floor: escalating
    triggers: [review, review this, code review, review this PR, review the diff]
    note: >
      Default per-PR depth: relevance-ranked top-N (3-8) with the round-based
      escalating floor; extend past N when the change's scope genuinely calls
      for another lens.
  - name: comprehensive
    breadth: >
      every relevant lens, uncapped — the full audit set at repo scope
    floor: Nit
    triggers: [thorough, comprehensive, deep review, use all relevant lenses, review everything]
    note: >
      On-demand or scheduled: run all relevant lenses and pin the floor at Nit so
      readability-class and other long-tail findings surface instead of being trimmed.
entrypoints:
  - name: reviewing-a-change
    description: >
      Review a diff, pull request, or code change with the code-quality-atlas
      lenses. Use for "review this PR / diff / change / what I pushed". Ranks the
      relevant diff lenses by relevance and runs them at the chosen depth
      (review = top few; comprehensive = all relevant), then synthesizes one
      verdict. The collapsed, repo-independent entrypoint for change review.
    shapes: [diff]
  - name: auditing-a-repository
    description: >
      Run a whole-repository health audit with the code-quality-atlas repo-shaped
      audits (architecture, dependencies, config/build, docs, compliance,
      enforcement, infrastructure-as-code, maintainability hotspots). Use for a
      scheduled or on-demand repo audit, not a single diff. Runs the applicable
      audits and synthesizes one report.
    shapes: [repo]
  - name: reviewing-a-decision
    description: >
      Review a decision rather than code — an ADR, RFC, design doc, dependency or
      technology adoption, build-vs-buy or vendor choice, or a deprecation/sunset
      plan. Reviews the choice and its record (rationale, lock-in, exit, revisit
      trigger) with the decision lens plus the design-capable lenses for the
      decision's domain.
    shapes: [decision]
    include_design: true
  - name: reviewing-an-artifact
    description: >
      Review a standardized authored artifact against its own published standard
      rather than as application code — e.g. a SKILL.md / agent-skill definition.
      Detects the artifact and applies its rubric. The collapsed entrypoint for
      artifact-shaped review.
    shapes: [artifact]
